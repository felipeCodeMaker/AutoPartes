{% extends "base.html" %}

{% block contenido %}
<h2>Confirmar eliminación</h2>
<p>¿Estás seguro de que deseas eliminar la pieza <strong>{{ pieza.nombre }}</strong>?</p>
<form method="POST" action="{{ url_for('confirmar_eliminar', nombre=pieza.nombre) }}">
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{{ url_for('catalogo') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
